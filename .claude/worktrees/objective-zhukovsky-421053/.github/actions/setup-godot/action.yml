name: Setup Godot
description: Install Godot Engine for headless CI
inputs:
  version:
    description: 'Godot version'
    required: true
    default: '4.6.2'

runs:
  using: composite
  steps:
    - name: Download Godot
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        MAJOR=$(echo "$VERSION" | cut -d. -f1-2)
        URL="https://github.com/godotengine/godot/releases/download/${VERSION}-stable/Godot_v${VERSION}-stable_linux.x86_64.zip"
        
        echo "Downloading Godot $VERSION..."
        curl -sSL "$URL" -o /tmp/godot.zip
        unzip -q /tmp/godot.zip -d /tmp/godot
        sudo mv /tmp/godot/Godot_* /usr/local/bin/godot
        chmod +x /usr/local/bin/godot
        
        echo "Godot version:"
        godot --version