<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape" />
    <meta name="screen-orientation" content="landscape" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Finding Colour</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        background: #07050f;
      }
      body {
        width: 100vw;
        height: 100dvh;  /* dynamic viewport — handles mobile browser chrome */
        background: #07050f;
        overflow: hidden;
        touch-action: none;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #game-container {
        width: 100vw;
        height: 100dvh;
        position: fixed;
        top: 0;
        left: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      canvas {
        display: block;
        max-width: 100vw;
        max-height: 100dvh;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>

    <!-- Pause overlay -->
    <div id="pause-overlay" style="
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(7,5,15,0.88);
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      font-family: monospace;
      pointer-events: none;
    ">
      <div style="color:#4d8fdc;font-size:36px;">Paused</div>
      <div style="color:#8888aa;font-size:16px;">Waiting for game to resume...</div>
    </div>

    <!-- Disconnect overlay -->
    <div id="disconnect-overlay" style="
      display: none;
      position: fixed;
      inset: 0;
      z-index: 60;
      background: rgba(7,5,15,0.92);
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      font-family: monospace;
    ">
      <div style="color:#d84040;font-size:24px;">Disconnected</div>
      <div style="color:#8888aa;font-size:15px;text-align:center;">Lost connection to game.<br>Trying to reconnect...</div>
      <button id="reconnect-btn" style="
        margin-top: 8px;
        padding: 12px 32px;
        font-size: 18px;
        font-family: monospace;
        background: #1a1530;
        color: #4d8fdc;
        border: 2px solid #3a3060;
        border-radius: 8px;
        cursor: pointer;
      ">Reconnect Now</button>
    </div>

    <!-- Room code overlay — shown by LobbyScene, hidden once connected -->
    <div id="lobby-overlay" style="
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #07050f;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      font-family: monospace;
    ">
      <div style="color:#4d8fdc;font-size:28px;">Finding Colour</div>
      <div style="color:#8888aa;font-size:16px;text-align:center;">Enter the room code<br>shown on screen</div>
      <input id="room-code-input"
        type="text"
        maxlength="4"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
        spellcheck="false"
        placeholder="XXXX"
        style="
          font-size: 48px;
          font-family: monospace;
          text-align: center;
          letter-spacing: 12px;
          width: 220px;
          padding: 12px;
          background: #1a1530;
          color: #ffffff;
          border: 2px solid #3a3060;
          border-radius: 8px;
          outline: none;
          text-transform: uppercase;
        "
      />
      <div id="lobby-status" style="color:#ff6666;font-size:16px;min-height:24px;"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
